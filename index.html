<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz BD – Parcial 3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface-0,#f1efe8);color:var(--text-primary,#1a1a18);min-height:100vh;padding:0}
:root{
  --surface-0:#f1efe8;--surface-1:#fafaf7;--surface-2:#ffffff;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#888780;
  --border:rgba(0,0,0,0.1);--border-strong:rgba(0,0,0,0.18);
  --accent:#185FA5;--accent-bg:#E6F1FB;--accent-text:#0C447C;
  --success:#3B6D11;--success-bg:#EAF3DE;--success-border:#639922;
  --danger:#A32D2D;--danger-bg:#FCEBEB;--danger-border:#E24B4A;
  --radius:8px;--shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 0.5px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --surface-0:#1c1c1a;--surface-1:#252522;--surface-2:#2e2e2b;
    --text-primary:#e8e6df;--text-secondary:#a8a69f;--text-muted:#666460;
    --border:rgba(255,255,255,0.09);--border-strong:rgba(255,255,255,0.15);
    --accent:#378ADD;--accent-bg:#042C53;--accent-text:#85B7EB;
    --success:#97C459;--success-bg:#173404;--success-border:#3B6D11;
    --danger:#E24B4A;--danger-bg:#501313;--danger-border:#A32D2D;
  }
}

/* ── SETUP SCREEN ── */
#setup{display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:16px;padding:32px;max-width:480px;width:100%}
.setup-card h1{font-size:20px;font-weight:500;margin-bottom:4px}
.setup-card .sub{font-size:13px;color:var(--text-muted);margin-bottom:28px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:8px}
.chip-group{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 16px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text);font-weight:500}
.qty-row{display:flex;align-items:center;gap:12px}
.qty-row input[type=range]{flex:1;accent-color:var(--accent)}
.qty-val{font-size:18px;font-weight:500;min-width:32px;text-align:center;color:var(--accent-text)}
.qty-max{font-size:12px;color:var(--text-muted)}
.btn-primary{width:100%;padding:11px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.4;cursor:default}

/* ── QUIZ SCREEN ── */
#quiz-screen{display:none;flex-direction:column;min-height:100vh}
.quiz-header{position:sticky;top:0;z-index:10;background:var(--surface-2);border-bottom:0.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
.quiz-header h2{font-size:14px;font-weight:500;flex:1}
.progress-wrap{flex:1;background:var(--surface-0);border-radius:4px;height:4px;overflow:hidden}
.progress-bar{height:4px;background:var(--accent);border-radius:4px;transition:width .3s}
.score-badge{font-size:13px;font-weight:500;padding:4px 12px;border-radius:20px;background:var(--accent-bg);color:var(--accent-text)}
.btn-icon{background:none;border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text-secondary);display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-icon:hover{background:var(--surface-1)}

.quiz-body{flex:1;padding:20px;max-width:680px;margin:0 auto;width:100%}
.q-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:20px 22px;transition:border-color .2s}
.q-meta{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-type-pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.05em}
.pill-tf{background:var(--accent-bg);color:var(--accent-text)}
.pill-mc{background:#EDE9FB;color:#3C3489}
@media(prefers-color-scheme:dark){.pill-mc{background:#26215C;color:#AFA9EC}}
.q-text{font-size:16px;line-height:1.6;margin-bottom:18px;font-weight:400}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);cursor:pointer;font-size:14px;color:var(--text-primary);text-align:left;transition:all .15s;width:100%}
.opt-btn:hover:not(:disabled){background:var(--accent-bg);border-color:var(--accent)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:var(--success-bg);border-color:var(--success-border);color:var(--success)}
.opt-btn.wrong{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.opt-letter{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--surface-2);color:var(--text-muted)}
.opt-btn.correct .opt-letter{background:var(--success-border);border-color:var(--success-border);color:#fff}
.opt-btn.wrong .opt-letter{background:var(--danger-border);border-color:var(--danger-border);color:#fff}
.feedback-row{margin-top:12px;display:flex;align-items:center;gap:8px;font-size:13px;min-height:20px}
.fb-correct{color:var(--success)}
.fb-wrong{color:var(--danger)}

.nav-row{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;max-width:680px;margin:0 auto;width:100%}
.btn-nav{padding:9px 20px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);font-size:14px;cursor:pointer;color:var(--text-primary);display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-nav:hover{background:var(--surface-1)}
.btn-nav:disabled{opacity:.35;cursor:default}
.btn-nav.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-nav.primary:hover{opacity:.88}

/* ── RESULTS SCREEN ── */
#results-screen{display:none;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.results-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:16px;padding:32px;max-width:480px;width:100%;text-align:center}
.score-circle{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;font-weight:500}
.score-num{font-size:28px;line-height:1}
.score-den{font-size:12px;color:inherit;opacity:.7}
.grade-label{font-size:20px;font-weight:500;margin-bottom:6px}
.grade-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-box{background:var(--surface-1);border-radius:var(--radius);padding:14px;text-align:center}
.stat-n{font-size:22px;font-weight:500}
.stat-l{font-size:12px;color:var(--text-muted);margin-top:2px}
.results-btns{display:flex;flex-direction:column;gap:8px}
.btn-outline{padding:10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:none;font-size:14px;cursor:pointer;color:var(--text-primary);transition:background .15s}
.btn-outline:hover{background:var(--surface-1)}
</style>
</head>
<body>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-card">
    <h1>Bases de Datos — Parcial 3</h1>
    <p class="sub">Configura tu sesión de práctica</p>

    <div class="field">
      <label>Tipo de preguntas</label>
      <div class="chip-group">
        <button class="chip active" data-type="both" onclick="setType('both',this)">Ambas</button>
        <button class="chip" data-type="tf" onclick="setType('tf',this)">Solo verdadero / falso</button>
        <button class="chip" data-type="mc" onclick="setType('mc',this)">Solo selección múltiple</button>
      </div>
    </div>

    <div class="field">
      <label>Cantidad de preguntas <span class="qty-max" id="qty-max-label">(39 disponibles)</span></label>
      <div class="chip-group" id="qty-chips"></div>
    </div>

    <button class="btn-primary" onclick="startQuiz()"><i class="ti ti-player-play" aria-hidden="true"></i> Comenzar</button>
  </div>
</div>

<!-- ── QUIZ ── -->
<div id="quiz-screen">
  <div class="quiz-header">
    <h2 id="q-counter">Pregunta 1 de 10</h2>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <span class="score-badge" id="score-live">✓ 0</span>
    <button class="btn-icon" onclick="goSetup()"><i class="ti ti-x" aria-hidden="true"></i> Salir</button>
  </div>

  <div class="quiz-body">
    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span id="q-type-pill" class="q-type-pill pill-tf">Verdadero / Falso</span>
        <span id="q-num-meta"></span>
      </div>
      <p class="q-text" id="q-text"></p>
      <div class="options" id="options"></div>
      <div class="feedback-row" id="feedback"></div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn-nav" id="btn-prev" onclick="navigate(-1)" disabled>
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Anterior
    </button>
    <button class="btn-nav primary" id="btn-next" onclick="navigate(1)">
      Siguiente <i class="ti ti-arrow-right" aria-hidden="true"></i>
    </button>
  </div>
</div>

<!-- ── RESULTS ── -->
<div id="results-screen">
  <div class="results-card">
    <div class="score-circle" id="res-circle">
      <span class="score-num" id="res-num"></span>
      <span class="score-den" id="res-den"></span>
    </div>
    <p class="grade-label" id="res-label"></p>
    <p class="grade-sub" id="res-sub"></p>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n" id="res-correct" style="color:var(--success)"></div><div class="stat-l">correctas</div></div>
      <div class="stat-box"><div class="stat-n" id="res-wrong" style="color:var(--danger)"></div><div class="stat-l">incorrectas</div></div>
    </div>
    <div class="results-btns">
      <button class="btn-primary" onclick="reviewMode()"><i class="ti ti-eye" aria-hidden="true"></i> Revisar respuestas</button>
      <button class="btn-outline" onclick="startQuiz()"><i class="ti ti-refresh" aria-hidden="true"></i> Repetir misma config</button>
      <button class="btn-outline" onclick="goSetup()"><i class="ti ti-settings" aria-hidden="true"></i> Nueva configuración</button>
    </div>
  </div>
</div>

<script>
const TF=[
  {q:"Base de datos relacional es una colección de relaciones normalizadas en la que cada relación tiene un nombre distintivo.",ans:"Cierto"},
  {q:"Cuando la cardinalidad de una relación es de 1:M, el esquema lógico (relacional) resultante debe tener por obligación una tabla que represente esa relación entre entidades.",ans:"Falso"},
  {q:"Si una llave foránea es parte de una llave primaria, significa que esa llave foránea no puede ser nula.",ans:"Cierto"},
  {q:"En una relación 1:N la ubicación de la llave foránea es arbitraria.",ans:"Falso"},
  {q:"La regla de la integridad de entidad en el modelo relacional hace referencia a que los atributos de la clave primaria puedan ser de valor nulo.",ans:"Falso"},
  {q:"El modelo Entidad-Relación se utiliza principalmente para implementar físicamente una base de datos.",ans:"Falso"},
  {q:"Una relación en el modelo relacional corresponde a una tabla en una base de datos.",ans:"Cierto"},
  {q:"Las claves primarias pueden repetirse en una tabla relacional.",ans:"Falso"},
  {q:"Llave candidata es la combinación de varios atributos, de forma tal que la combinación es única.",ans:"Falso"},
  {q:"La estructura principal del modelo relacional es una tabla constituida por tuplas y atributos.",ans:"Cierto"},
  {q:"Una entidad débil por identificación es una entidad en la que su llave es compuesta y en la que ninguna de sus partes es un identificador (o llave) de otra entidad.",ans:"Falso"},
  {q:"Cuando en el modelo E/R representamos una relación M:M, la llave primaria de la tabla asociada es una llave compuesta por las llaves primarias de cada uno de los tipos de entidades que se relacionan.",ans:"Cierto"},
  {q:"La integridad de entidad es una restricción que indica que en una relación base ningún atributo de una clave principal puede ser nulo.",ans:"Cierto"},
  {q:"Un modelo Entidad-Relación es un aspecto del mundo real que el diseñador intenta capturar en un sistema de información.",ans:"Cierto"},
  {q:"En el modelo relacional, los atributos multivaluados se almacenan directamente en una sola columna de una tabla.",ans:"Falso"},
  {q:"Una relación de cardinalidad uno a muchos implica que una entidad A puede estar relacionada con muchas entidades B, pero no al revés.",ans:"Cierto"},
  {q:"Las claves foráneas (foreign keys) se utilizan para garantizar la integridad referencial entre tablas.",ans:"Cierto"},
  {q:"Una llave compuesta puede ser parcialmente nula.",ans:"Falso"},
  {q:"Entre los componentes de un Modelo E/R se incluyen solamente: Entidades, Atributos y Llaves.",ans:"Falso"},
  {q:"Cuando se transforma un diagrama E/R a esquema relacional, todas las relaciones se convierten en esquema.",ans:"Falso"},
  {q:"Cuando un atributo se señala como Multivalorado para una entidad de un Modelo E/R, el diseño tabular del modelo Relacional se ve alterado por la inclusión de una tabla.",ans:"Cierto"},
  {q:"La existencia de una instancia de una entidad débil está supeditada a la existencia de una instancia de la entidad fuerte con la cual está relacionada.",ans:"Cierto"},
  {q:"La clave principal o PK, es la que se selecciona para identificar de forma unívoca cada entidad de un conjunto de entidades.",ans:"Cierto"},
  {q:"La cláusula Where de una sentencia SELECT selecciona las filas a incluir en el resultado, aplicando una condición de búsqueda a las filas de la tabla.",ans:"Cierto"}
];

const MC=[
  {q:"Un atributo compuesto se divide en:",opts:["Subpartes","Cadenas de texto","Subpartes y cadenas de texto","En un único valor"],ans:"Subpartes"},
  {q:"Es requerido que cada subclase pueda tener:",opts:["Dos categorías padre","Ninguna clase padre","Una clase padre","Ninguna"],ans:"Una clase padre"},
  {q:"La Superclase también se llama:",opts:["Especialización","Generalización","Subclase","a ó b"],ans:"Generalización"},
  {q:"La cláusula FROM especifica:",opts:["Las columnas que se incluirán en los resultados de una recuperación","La tabla o tablas que contienen los datos de una recuperación","a y b","Ninguna de las anteriores"],ans:"La tabla o tablas que contienen los datos de una recuperación"},
  {q:"Representa alguna propiedad de una entidad o relación:",opts:["Datos o valor","Tipos de datos","Atributos","Modelo"],ans:"Atributos"},
  {q:"¿Cuál de las siguientes aseveraciones es correcta?",opts:["Cada llave candidata es una llave foránea","Cada llave primaria es una llave foránea","Cada llave foránea es una llave candidata","Cada llave foránea es llave primaria en alguna relación"],ans:"Cada llave foránea es llave primaria en alguna relación"},
  {q:"El modelo relacional representa la base de datos como:",opts:["Una colección de relaciones","Modelo conceptual","Conjunto de tuplas","Conjunto de atributos"],ans:"Una colección de relaciones"},
  {q:"Durante el proceso de modelado entidad/relación, el diseñador debe:",opts:["Definir entidades, atributos, llaves primarias y foráneas","Tomar decisiones sobre añadir atributos de llave primaria","Tomar decisiones sobre el tratamiento de atributos multivaluados","Todas las anteriores"],ans:"Todas las anteriores"},
  {q:"En el modelo relacional, un atributo compuesto como \"nombre completo\" se recomienda:",opts:["Almacenarlo tal cual en una sola columna","Dividirlo en atributos más simples como nombre y apellido","Ignorarlo en el diseño","Convertirlo en una clave primaria"],ans:"Dividirlo en atributos más simples como nombre y apellido"},
  {q:"Base de datos principal para la ejecución de SQL Server:",opts:["BD Master","BD Model","BD Pubs","Todas las anteriores"],ans:"BD Master"},
  {q:"Una relación 1:1 entre dos entidades generalmente se implementa en el modelo relacional como:",opts:["Dos tablas sin claves","Dos tablas unidas por una tabla puente","Una clave foránea en una de las dos tablas","Una sola tabla combinada"],ans:"Una clave foránea en una de las dos tablas"},
  {q:"¿Cómo se denominan las cosas del mundo real con existencia física o conceptual que se almacenan en el modelo relacional?",opts:["Entidades","Propiedades","Objetos","Consultas"],ans:"Entidades"},
  {q:"Indique el tipo de cardinalidad: Una entidad en A se asocia con cualquier número de entidades en B. Una entidad en B puede asociarse a lo sumo con alguna entidad en A.",opts:["Varios a varios","Uno a uno","Varios a uno","Uno a varios"],ans:"Varios a uno"},
  {q:"¿Cuál es la función principal de una clave foránea?",opts:["Eliminar registros duplicados","Garantizar la unicidad de una fila","Establecer una relación con otra tabla","Calcular promedios entre tablas"],ans:"Establecer una relación con otra tabla"},
  {q:"¿Cómo se denominan los atributos que tienen un conjunto de valores para una entidad específica?",opts:["Multimedias","Multivaluados","Multicódigos","Multicausales"],ans:"Multivaluados"}
];

const LETTERS=['A','B','C','D'];

let selectedType='both', qty=10, questions=[], current=0, answers=[], score=0, isReview=false;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function setType(t, el){
  selectedType=t;
  document.querySelectorAll('.chip[data-type]').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  rebuildQtyChips();
}

function getPoolSize(){
  return selectedType==='tf'?TF.length:selectedType==='mc'?MC.length:TF.length+MC.length;
}

function rebuildQtyChips(){
  const max=getPoolSize();
  document.getElementById('qty-max-label').textContent='('+max+' disponibles)';
  const steps=[5,10,15,20];
  const chipsDiv=document.getElementById('qty-chips');
  chipsDiv.innerHTML='';
  steps.filter(s=>s<max).forEach(s=>{
    const b=document.createElement('button');
    b.className='chip';
    b.textContent=s;
    b.onclick=()=>setQty(s,b);
    chipsDiv.appendChild(b);
  });
  const all=document.createElement('button');
  all.className='chip active';
  all.textContent='Todas ('+max+')';
  all.onclick=()=>setQty(max,all);
  chipsDiv.appendChild(all);
  qty=max;
}

function setQty(v, el){
  qty=v;
  document.querySelectorAll('#qty-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function buildPool(){
  let pool;
  if(selectedType==='tf') pool=TF.map(x=>({...x,type:'tf'}));
  else if(selectedType==='mc') pool=MC.map(x=>({...x,type:'mc'}));
  else pool=[...TF.map(x=>({...x,type:'tf'})),...MC.map(x=>({...x,type:'mc'}))];
  pool=shuffle(pool);
  pool=pool.slice(0,qty);
  pool.forEach(p=>{
    if(p.type==='tf') p.opts=shuffle(['Cierto','Falso']);
    else p.opts=shuffle(p.opts);
  });
  return pool;
}

function startQuiz(){
  questions=buildPool();
  answers=Array(questions.length).fill(null);
  score=0; current=0; isReview=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('results-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='flex';
  document.getElementById('btn-next').disabled=false;
  renderQuestion();
}

function goSetup(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='none';
  document.getElementById('setup').style.display='flex';
}

function renderQuestion(){
  const q=questions[current];
  const userAns=answers[current];
  const answered=userAns!==null;

  document.getElementById('q-counter').textContent='Pregunta '+(current+1)+' de '+questions.length;
  document.getElementById('q-num-meta').textContent=(current+1)+' / '+questions.length;
  document.getElementById('progress-bar').style.width=(((current+1)/questions.length)*100)+'%';

  const pill=document.getElementById('q-type-pill');
  if(q.type==='tf'){pill.textContent='Verdadero / Falso';pill.className='q-type-pill pill-tf';}
  else{pill.textContent='Selección múltiple';pill.className='q-type-pill pill-mc';}

  document.getElementById('q-text').textContent=q.q;

  const optsDiv=document.getElementById('options');
  optsDiv.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    if(!answered&&!isReview) btn.onclick=()=>selectAnswer(opt);
    else btn.disabled=true;
    if(answered||isReview){
      if(opt===q.ans) btn.classList.add('correct');
      else if(opt===userAns&&userAns!==q.ans) btn.classList.add('wrong');
    }
    optsDiv.appendChild(btn);
  });

  const fb=document.getElementById('feedback');
  if(answered||isReview){
    const ok=userAns===q.ans||(isReview&&userAns===null);
    if(isReview&&userAns===null){fb.innerHTML='';return;}
    fb.innerHTML=userAns===q.ans
      ? `<i class="ti ti-check" style="color:var(--success)"></i><span class="fb-correct">Correcto</span>`
      : `<i class="ti ti-x" style="color:var(--danger)"></i><span class="fb-wrong">Incorrecto — la respuesta es: <strong>${q.ans}</strong></span>`;
  } else {fb.innerHTML='';}

  updateScoreLive();
  document.getElementById('btn-prev').disabled=current===0;
  const nextBtn=document.getElementById('btn-next');
  if(current===questions.length-1){
    nextBtn.innerHTML='Ver resultados <i class="ti ti-chart-bar" aria-hidden="true"></i>';
    nextBtn.onclick=showResults;
  } else {
    nextBtn.innerHTML='Siguiente <i class="ti ti-arrow-right" aria-hidden="true"></i>';
    nextBtn.onclick=()=>navigate(1);
  }
  nextBtn.disabled=(!answered&&!isReview)&&current!==questions.length-1&&false;
  if(!answered&&!isReview&&current===questions.length-1) nextBtn.disabled=true;
}

function selectAnswer(opt){
  const q=questions[current];
  answers[current]=opt;
  if(opt===q.ans) score++;
  updateScoreLive();
  renderQuestion();
  setTimeout(()=>{
    if(current<questions.length-1) navigate(1);
    else{
      const nb=document.getElementById('btn-next');
      nb.disabled=false;
    }
  },900);
}

function updateScoreLive(){
  document.getElementById('score-live').textContent='✓ '+score;
}

function navigate(dir){
  current+=dir;
  if(current<0) current=0;
  if(current>=questions.length) current=questions.length-1;
  renderQuestion();
}

function showResults(){
  let correct=answers.filter((a,i)=>a===questions[i].ans).length;
  let wrong=answers.filter((a,i)=>a!==null&&a!==questions[i].ans).length;
  let unanswered=answers.filter(a=>a===null).length;
  let pct=Math.round((correct/questions.length)*100);

  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='flex';

  const circle=document.getElementById('res-circle');
  if(pct>=70){circle.style.background='var(--success-bg)';circle.style.color='var(--success)';}
  else{circle.style.background='var(--danger-bg)';circle.style.color='var(--danger)';}
  document.getElementById('res-num').textContent=pct+'%';
  document.getElementById('res-den').textContent=correct+' / '+questions.length;

  let label,sub;
  if(pct>=90){label='Excelente';sub='Dominas el tema.';}
  else if(pct>=70){label='Aprobado';sub='Buen trabajo, repasa los errores.';}
  else if(pct>=50){label='Por mejorar';sub='Repasa el material y vuelve a intentarlo.';}
  else{label='Necesitas repasar';sub='Revisa bien los temas antes del parcial.';}
  document.getElementById('res-label').textContent=label;
  document.getElementById('res-sub').textContent=sub;
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=wrong+(unanswered?' (+'+unanswered+' sin responder)':'');
}

function reviewMode(){
  isReview=true; current=0;
  document.getElementById('results-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='flex';
  const nextBtn=document.getElementById('btn-next');
  nextBtn.innerHTML='Siguiente <i class="ti ti-arrow-right" aria-hidden="true"></i>';
  nextBtn.onclick=()=>navigate(1);
  nextBtn.disabled=false;
  renderQuestion();
}

rebuildQtyChips();
</script>
</body>
</html>
