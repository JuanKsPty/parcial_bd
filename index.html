<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcial 2 — Repaso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15231f;
    --paper:#f4f0e6;
    --card:#fffdf7;
    --accent:#1f6f5c;
    --accent-soft:#d8e9e2;
    --gold:#c08a2d;
    --wrong:#b4452f;
    --wrong-soft:#f4ddd5;
    --right:#1f6f5c;
    --right-soft:#d3ead f;
    --line:#e3dcc9;
    --muted:#6a7873;
    --shadow:0 18px 40px -22px rgba(21,35,31,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    background:
      radial-gradient(120% 90% at 90% -10%, #e9e3d2 0%, transparent 55%),
      radial-gradient(120% 90% at -10% 110%, #e3eee7 0%, transparent 55%),
      var(--paper);
    color:var(--ink);
    min-height:100%;
    display:flex;
    justify-content:center;
    padding:32px 18px 60px;
    line-height:1.5;
  }
  .wrap{width:100%;max-width:760px}

  /* header */
  header.masthead{
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:26px;
    display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
  }
  .masthead .kicker{
    font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);font-weight:600;
  }
  .masthead h1{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:1.75rem;line-height:1.05;margin-top:4px;
  }
  .masthead .seal{
    font-family:'Fraunces',serif;font-style:italic;
    font-size:.95rem;color:var(--accent);text-align:right;white-space:nowrap;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:30px;
  }

  /* start screen */
  .lead{font-size:1.02rem;color:var(--muted);margin-bottom:24px}
  .lead b{color:var(--ink)}
  .controls{display:grid;gap:20px;margin-bottom:26px}
  .field label{
    display:block;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
    font-weight:700;color:var(--muted);margin-bottom:10px;
  }
  .seg{display:flex;flex-wrap:wrap;gap:8px}
  .seg button{
    font-family:inherit;font-size:.9rem;font-weight:600;
    padding:9px 16px;border-radius:999px;cursor:pointer;
    border:1.5px solid var(--line);background:transparent;color:var(--ink);
    transition:all .15s ease;
  }
  .seg button:hover{border-color:var(--accent)}
  .seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .btn{
    font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;
    border:none;border-radius:12px;padding:15px 22px;
    background:var(--accent);color:#fff;width:100%;
    transition:transform .12s ease, background .15s ease;
    box-shadow:0 10px 22px -12px rgba(31,111,92,.8);
  }
  .btn:hover{background:#185847;transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent);box-shadow:none}
  .btn.ghost:hover{background:var(--accent-soft)}

  /* quiz */
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:14px}
  .counter{font-size:.8rem;font-weight:700;letter-spacing:.05em;color:var(--muted)}
  .tag{
    font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
    padding:5px 11px;border-radius:999px;background:var(--accent-soft);color:var(--accent);
  }
  .tag.vf{background:#f1e6cf;color:var(--gold)}
  .progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:26px}
  .progress span{display:block;height:100%;background:var(--accent);width:0;transition:width .35s ease}

  .qtext{
    font-family:'Fraunces',serif;font-weight:500;
    font-size:1.4rem;line-height:1.3;margin-bottom:24px;
  }
  .opts{display:grid;gap:11px}
  .opt{
    font-family:inherit;font-size:1rem;text-align:left;cursor:pointer;
    padding:15px 17px;border-radius:12px;
    border:1.5px solid var(--line);background:#fff;color:var(--ink);
    display:flex;align-items:center;gap:14px;transition:all .14s ease;
  }
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
  .opt .key{
    flex:none;width:28px;height:28px;border-radius:8px;
    display:grid;place-items:center;font-weight:700;font-size:.85rem;
    background:var(--paper);border:1px solid var(--line);
  }
  .opt.correct{border-color:var(--right);background:var(--right-soft)}
  .opt.correct .key{background:var(--right);color:#fff;border-color:var(--right)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-soft)}
  .opt.wrong .key{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt:disabled{cursor:default}

  .feedback{margin-top:20px;font-size:.95rem;display:none}
  .feedback.show{display:block;animation:fade .25s ease}
  .feedback .badge{font-weight:700}
  .feedback.ok .badge{color:var(--right)}
  .feedback.no .badge{color:var(--wrong)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .nav{margin-top:26px;display:flex;justify-content:flex-end}
  .nav .btn{width:auto;min-width:160px}

  /* results */
  .score-ring{text-align:center;margin-bottom:8px}
  .score-num{font-family:'Fraunces',serif;font-size:4rem;font-weight:700;line-height:1}
  .score-sub{color:var(--muted);font-size:.95rem;margin-bottom:4px}
  .grade{font-family:'Fraunces',serif;font-style:italic;font-size:1.3rem;color:var(--accent);margin-bottom:24px;text-align:center}
  .review{display:grid;gap:12px;margin:8px 0 26px}
  .rev-item{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:#fff}
  .rev-item .rq{font-weight:600;margin-bottom:8px;font-size:.95rem}
  .rev-line{font-size:.88rem;color:var(--muted);display:flex;gap:8px;align-items:baseline}
  .rev-line.you.bad{color:var(--wrong)}
  .rev-line.sol{color:var(--right);font-weight:600}
  .rev-dot{font-size:1.1rem;line-height:1}
  .actions{display:grid;gap:10px}

  footer{text-align:center;margin-top:24px;font-size:.78rem;color:var(--muted)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div>
      <div class="kicker">Cuestionario de práctica</div>
      <h1>Parcial 2 — Repaso</h1>
    </div>
  </header>

  <!-- START -->
  <section id="start" class="card">
    <p class="lead">Cuestionario de práctica con las secciones de <b>Cierto / Falso</b> y <b>Selección múltiple</b>. Las preguntas y las opciones aparecen en <b>orden aleatorio</b> cada vez.</p>
    <div class="controls">
      <div class="field">
        <label>Secciones</label>
        <div class="seg" id="segSection">
          <button data-sec="all" class="on">Todas</button>
          <button data-sec="vf">Cierto / Falso</button>
          <button data-sec="mc">Selección</button>
        </div>
      </div>
      <div class="field">
        <label>Cantidad de preguntas</label>
        <div class="seg" id="segCount">
          <button data-count="10">10</button>
          <button data-count="20">20</button>
          <button data-count="0" class="on">Todas</button>
        </div>
      </div>
    </div>
    <button class="btn" id="startBtn">Comenzar repaso</button>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="card hidden">
    <div class="topbar">
      <span class="counter" id="counter">Pregunta 1 / 30</span>
      <span class="tag" id="tag">Selección</span>
    </div>
    <div class="progress"><span id="bar"></span></div>
    <div class="qtext" id="qtext"></div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav"><button class="btn" id="nextBtn" disabled>Siguiente</button></div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="card hidden">
    <div class="score-ring">
      <div class="score-num" id="scoreNum">0%</div>
      <div class="score-sub" id="scoreSub">0 de 0 correctas</div>
    </div>
    <div class="grade" id="grade"></div>
    <div class="review" id="review"></div>
    <div class="actions">
      <button class="btn" id="retryBtn">Repetir (nuevo orden)</button>
      <button class="btn ghost" id="homeBtn">Cambiar configuración</button>
    </div>
  </section>

  <footer>Material de estudio · 13 preguntas C/F · 17 de selección</footer>
</div>

<script>
/* ===== Banco de preguntas =====
   type: 'vf'  -> opciones Cierto/Falso, answer = índice correcto (0 Cierto, 1 Falso)
   type: 'mc'  -> opciones múltiples, answer = índice correcto en options
*/
const BANK = [
  // ---------- CIERTO / FALSO ----------
  { type:'vf', q:'Iniciar el desarrollo de las aplicaciones implica la obtención de requerimientos para definir el alcance y propósito del SI.', answer:0 },
  { type:'vf', q:'El objetivo del análisis del problema es conocer los posibles usuarios del sistema.', answer:1 },
  { type:'vf', q:'No es importante que la información que se recopila para realizar el análisis del problema sea precisa.', answer:1 },
  { type:'vf', q:'Las metodologías ágiles reúnen prácticas y principios que se basan en la colaboración, la iteración y la entrega incremental de valor.', answer:0 },
  { type:'vf', q:'Visión es un documento de alto nivel que describe el "Cómo" y el "Cuándo" del producto o aplicación.', answer:1 },
  { type:'vf', q:'Los usuarios ayudan a identificar los límites del sistema.', answer:0 },
  { type:'vf', q:'Un requerimiento es una descripción de algo que el sistema es capaz de hacer con el objeto de satisfacer el propósito del sistema.', answer:0 },
  { type:'vf', q:'Identificar las restricciones en el sistema es una actividad del análisis del problema.', answer:0 },
  { type:'vf', q:'Identificar características del producto es una forma de visualizar "Cómo" se hará el producto.', answer:1 },
  { type:'vf', q:'Un requerimiento puede dejarse incompleto o ambiguo para refinarlo posteriormente.', answer:1 },
  { type:'vf', q:'FURPS es un modelo orientado a la calidad del software desde la perspectiva de funcionalidad, facilidad de uso, confiabilidad, desempeño y facilidad de mantenimiento del software.', answer:0 },
  { type:'vf', q:'Velocidad es un criterio del factor Facilidad de Uso del modelo FURPS.', answer:1 },
  { type:'vf', q:'La matriz de trazabilidad permite dar seguimiento a las necesidades de los usuarios para que se contemplen en las funcionalidades del sistema.', answer:0 },

  // ---------- SELECCIÓN ----------
  { type:'mc', q:'Se usa en proyectos con alto nivel de incertidumbre, requisitos cambiantes o poco definidos.',
    options:['Modelo Unificado','Modelo Incremental','Modelo Espiral'], answer:2 },
  { type:'mc', q:'Se caracteriza por estar dirigido por casos de uso, centrado en la arquitectura y por ser iterativo e incremental.',
    options:['Modelo Cascada','Proceso Unificado','Extreme Programming (XP)'], answer:1 },
  { type:'mc', q:'Marco de trabajo centrado en personas, flexible, escalable para proyectos de software utilizando el desarrollo ágil.',
    options:['Crystal Methodology','Modelo Iterativo','Modelo Espiral'], answer:0 },
  { type:'mc', q:'Fase del modelo unificado que incluye tareas de marketing, empaquetado, instalación, configuración, soporte y mantenimiento.',
    options:['Fase de Inicio','Fase de Elaboración','Fase de Transición'], answer:2 },
  { type:'mc', q:'Reduce el costo global de desarrollo al evitar trabajo redundante.',
    options:['Orientado a reutilización','Modelo Espiral','Modelo Iterativo'], answer:0 },
  { type:'mc', q:'No se ven resultados hasta finalizar el proyecto.',
    options:['Modelo Cascada','Modelo Incremental','Modelo Espiral'], answer:0 },
  { type:'mc', q:'Este modelo tiene ciclos, denominados SPRINT, que duran entre dos y cuatro semanas.',
    options:['Proceso Unificado','SCRUM','Modelo Espiral'], answer:1 },
  { type:'mc', q:'Suministra una porción de la funcionalidad respecto de la totalidad de los requisitos del proyecto.',
    options:['Modelo Cascada','Modelo Incremental','Modelo Espiral'], answer:1 },
  { type:'mc', q:'En este modelo no hace falta que los requisitos estén totalmente definidos al inicio del proyecto.',
    options:['Modelo Cascada','Modelo Iterativo','Orientado a reutilización'], answer:1 },
  { type:'mc', q:'Está orientado a detectar y prevenir el riesgo.',
    options:['Modelo Incremental','Lean Software','Modelo Espiral'], answer:2 },
  { type:'mc', q:'Configura aplicaciones desde componentes preparados de software.',
    options:['Prototipo','Orientado a reutilización','Modelo Espiral'], answer:1 },
  { type:'mc', q:'Su objetivo es optimizar la eficiencia y minimizar el desperdicio en el proceso de desarrollo de software.',
    options:['Lean Software','Prototipos','Proceso Unificado'], answer:0 },
  { type:'mc', q:'Desarrolla el sistema por fases temporales de manera que el cliente puede ver avances.',
    options:['Orientado a Reutilización','Proceso Unificado','Crystal Methodology'], answer:1 },
  { type:'mc', q:'Se caracteriza por estar enfocado en construir sistemas a partir de funcionalidades específicas.',
    options:['Desarrollo por Características (FDD)','Modelo Iterativo','Lean Software'], answer:0 },
  { type:'mc', q:'Es un marco de trabajo que puede ser adaptado a organizaciones o proyectos específicos.',
    options:['Modelo Unificado','Modelo Espiral','Modelo Iterativo'], answer:0 },
  { type:'mc', q:'Es una lista dinámica y priorizada que contiene todos los requisitos, funcionalidades y mejoras del producto.',
    options:['FDD','SCRUM','Lean Software'], answer:1 },
  { type:'mc', q:'Se basa en la creación de modelos iniciales funcionales o visuales que representan de manera simplificada el producto final.',
    options:['Prototipos','Modelo Espiral','Lean Software'], answer:0 },
];

/* ===== Estado ===== */
let cfg = { section:'all', count:0 };
let quiz = [];      // preguntas de la corrida (ya barajadas con opciones)
let idx = 0;
let answered = false;

const $ = id => document.getElementById(id);

function shuffle(a){
  const arr = a.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* Segmented controls */
function bindSeg(containerId, key, parse){
  $(containerId).addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    cfg[key] = parse(b);
  });
}
bindSeg('segSection','section', b=>b.dataset.sec);
bindSeg('segCount','count', b=>parseInt(b.dataset.count,10));

/* Construir la corrida */
function buildQuiz(){
  let pool = BANK.filter(q => cfg.section==='all' ? true : q.type===cfg.section);
  pool = shuffle(pool);
  if(cfg.count>0) pool = pool.slice(0, cfg.count);

  quiz = pool.map(q=>{
    if(q.type==='vf'){
      // Construimos opciones C/F manteniendo el índice correcto
      const base = [{t:'Cierto',ok:q.answer===0},{t:'Falso',ok:q.answer===1}];
      return { type:'vf', q:q.q, options:shuffle(base) };
    } else {
      const base = q.options.map((t,i)=>({t, ok:i===q.answer}));
      return { type:'mc', q:q.q, options:shuffle(base) };
    }
  });
}

/* Render de la pregunta actual */
function render(){
  answered = false;
  const item = quiz[idx];
  $('counter').textContent = `Pregunta ${idx+1} / ${quiz.length}`;
  const tag = $('tag');
  tag.textContent = item.type==='vf' ? 'Cierto / Falso' : 'Selección';
  tag.className = 'tag ' + (item.type==='vf' ? 'vf' : '');
  $('bar').style.width = ((idx)/quiz.length*100) + '%';
  $('qtext').textContent = item.q;

  const opts = $('opts');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  item.options.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="key">${letters[i]}</span><span>${o.t}</span>`;
    btn.addEventListener('click', ()=>choose(i));
    opts.appendChild(btn);
  });

  const fb = $('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  const nb = $('nextBtn');
  nb.disabled = true;
  nb.textContent = (idx === quiz.length-1) ? 'Ver resultados' : 'Siguiente';
}

function choose(i){
  if(answered) return;
  answered = true;
  const item = quiz[idx];
  const buttons = [...$('opts').children];
  buttons.forEach(b=>b.disabled = true);

  const correctIdx = item.options.findIndex(o=>o.ok);
  item.chosen = i;
  item.correct = item.options[i].ok;

  buttons[correctIdx].classList.add('correct');
  if(!item.correct) buttons[i].classList.add('wrong');

  const fb = $('feedback');
  if(item.correct){
    fb.className = 'feedback show ok';
    fb.innerHTML = `<span class="badge">✓ Correcto.</span>`;
  }else{
    fb.className = 'feedback show no';
    fb.innerHTML = `<span class="badge">✗ Incorrecto.</span> La respuesta correcta es <b>${item.options[correctIdx].t}</b>.`;
  }
  $('nextBtn').disabled = false;
}

function next(){
  if(idx < quiz.length-1){ idx++; render(); }
  else showResults();
}

function showResults(){
  $('quiz').classList.add('hidden');
  $('results').classList.remove('hidden');
  const total = quiz.length;
  const right = quiz.filter(q=>q.correct).length;
  const pct = Math.round(right/total*100);
  $('scoreNum').textContent = pct + '%';
  $('scoreSub').textContent = `${right} de ${total} correctas`;

  let msg;
  if(pct===100) msg='Impecable. Listo para el parcial.';
  else if(pct>=80) msg='Muy bien. Repasa los detalles que fallaron.';
  else if(pct>=60) msg='Vas bien, pero conviene afinar.';
  else msg='A reforzar conceptos antes del examen.';
  $('grade').textContent = msg;

  // Revisión solo de las falladas
  const review = $('review');
  review.innerHTML = '';
  const wrong = quiz.filter(q=>!q.correct);
  if(wrong.length===0){
    review.innerHTML = '<div class="rev-item"><div class="rq">Sin errores. 🎯</div></div>';
  }else{
    const head = document.createElement('div');
    head.style.cssText='font-weight:700;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px';
    head.textContent = `Para repasar (${wrong.length})`;
    review.appendChild(head);
    wrong.forEach(q=>{
      const correct = q.options.find(o=>o.ok).t;
      const chosen = q.options[q.chosen].t;
      const el = document.createElement('div');
      el.className='rev-item';
      el.innerHTML = `
        <div class="rq">${q.q}</div>
        <div class="rev-line you bad"><span class="rev-dot">✗</span> Tu respuesta: ${chosen}</div>
        <div class="rev-line sol"><span class="rev-dot">✓</span> Correcta: ${correct}</div>`;
      review.appendChild(el);
    });
  }
}

/* Navegación de pantallas */
function startQuiz(){
  buildQuiz();
  if(quiz.length===0) return;
  idx = 0;
  $('start').classList.add('hidden');
  $('results').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  render();
}

$('startBtn').addEventListener('click', startQuiz);
$('nextBtn').addEventListener('click', next);
$('retryBtn').addEventListener('click', startQuiz);
$('homeBtn').addEventListener('click', ()=>{
  $('results').classList.add('hidden');
  $('quiz').classList.add('hidden');
  $('start').classList.remove('hidden');
});
</script>
</body>
</html>
